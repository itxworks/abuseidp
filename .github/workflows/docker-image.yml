name: ci

on:
  push:
    branches:
      - "main"
    schedule:
      - cron: "30 5 1 * *"   # minute hour day month weekday

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PAT }}
      - name: Set lowercase repo name
        id: repo
        run: echo "repo=$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx (Cloud)
        uses: docker/setup-buildx-action@v3
        with:
          driver: cloud
          endpoint: "mp0185/my-builder"
          install: true
          
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ vars.DOCKER_USER }}/ci:latest
            ${{ vars.DOCKER_USER }}/ci:${{ github.sha }}
          outputs: ${{ github.event_name == 'pull_request' && 'type=cacheonly' || 'type=registry' }}
          